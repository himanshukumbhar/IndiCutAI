name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Complete Flutter Project Structure
        run: |
          mkdir -p temp_lib
          cp -r lib/* temp_lib/ 2>/dev/null || true
          cp pubspec.yaml temp_pubspec.yaml 2>/dev/null || true
          
          rm -rf lib pubspec.yaml
          flutter create --org com.indicut.ai --project-name indicut_ai .
          
          rm -rf lib/main.dart
          cp -r temp_lib/* lib/ 2>/dev/null || true
          cp temp_pubspec.yaml pubspec.yaml 2>/dev/null || true
          
          rm -rf temp_lib temp_pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          
